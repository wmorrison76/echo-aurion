# PHASE 5.3: Service configuration for load balancing and routing
apiVersion: v1
kind: Service
metadata:
  name: echocoder-service
  namespace: default
  labels:
    app: echocoder
spec:
  type: LoadBalancer
  selector:
    app: echocoder
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: echocoder-config
  namespace: default
data:
  supabase-url: "https://your-supabase-url.supabase.co"
  log-level: "info"
  node-env: "production"

---
# Secret for sensitive data (apply separately, don't commit!)
apiVersion: v1
kind: Secret
metadata:
  name: echocoder-secrets
  namespace: default
type: Opaque
stringData:
  supabase-service-role-key: "YOUR_SUPABASE_SERVICE_ROLE_KEY"
  openai-api-key: "YOUR_OPENAI_API_KEY"
  sentry-dsn: "YOUR_SENTRY_DSN"

---
# HorizontalPodAutoscaler for auto-scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: echocoder-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: echocoder-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
