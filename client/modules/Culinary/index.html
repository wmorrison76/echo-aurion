<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culinary • Echo Recipe Pro</title>
  </head>

  <body style="margin:0;background:#0b0f14;color:#e6edf3;font-family:system-ui,sans-serif;">
    <div id="root">
      <div id="app-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:1rem;">
        <div style="width:40px;height:40px;border:3px solid #1f2a37;border-top-color:#00d1ff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="margin:0;color:#9aa7b1;">Loading Culinary…</p>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
    <script>
      window.__appLoadError = null;
      function showLoadError(msg) {
        window.__appLoadError = msg;
        var root = document.getElementById('root');
        var loading = document.getElementById('app-loading');
        if (root && loading) {
          var escaped = (msg || 'Unknown error').replace(/</g, '&lt;').replace(/"/g, '&quot;');
          loading.innerHTML = '<div style="text-align:center;max-width:480px;"><h2 style="color:#ef4444;margin:0 0 0.5rem;">Failed to load app</h2><p style="color:#9aa7b1;margin:0 0 1rem;">' + escaped + '</p><p style="color:#6e7580;font-size:0.875rem;">Open DevTools (F12) → Console for details.</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:#0564ff;color:#fff;border:none;border-radius:6px;cursor:pointer;">Reload</button></div>';
        }
      }
      window.onerror = function(msg, src, line, col, err) {
        showLoadError(err && err.message ? err.message : msg);
        return false;
      };
      window.onunhandledrejection = function(e) {
        var msg = (e.reason && (e.reason.message || e.reason)) || 'Unhandled error';
        showLoadError(typeof msg === 'string' ? msg : String(msg));
      };
    </script>
    <script type="module" src="/client/modules/Culinary/entry.tsx"></script>
  </body>
</html>
