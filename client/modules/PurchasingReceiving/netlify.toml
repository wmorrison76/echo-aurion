[build]
  command = "pnpm build"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.14.0"

# Redirects for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;"

# Cache configuration
[[headers]]
  for = "/dist/spa/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/dist/spa/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables for different deploy contexts
[context.production]
  environment = { VITE_API_URL = "https://api.echo-ops.com" }

[context.preview]
  environment = { VITE_API_URL = "https://preview-api.echo-ops.com" }

[context.deploy-preview]
  environment = { VITE_API_URL = "https://preview-api.echo-ops.com" }

[context.branch-deploy]
  environment = { VITE_API_URL = "https://dev-api.echo-ops.com" }

# Function configuration
[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Performance monitoring
[dev]
  command = "pnpm dev"
  port = 8080

# Analytics
[[plugins]]
  package = "@netlify/plugin-lighthouse"
