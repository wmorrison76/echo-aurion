version: '3.8'

services:
  fusion-service:
    build: .
    container_name: echo-fusion-service
    ports:
      - "8000:8000"
    environment:
      ENV: development
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      NODEJS_CALLBACK_URL: http://host.docker.internal:3000
      PORT: 8000
    volumes:
      - ./main.py:/app/main.py
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  echo-network:
    driver: bridge
