<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#faf6ec" stop-opacity="1"/>
      <stop offset="50%" stop-color="#f4eee0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ebe2ce" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#e8d9b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f4eee0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a6d3b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8a6d3b" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.43  0 0 0 0 0.23  0 0 0 0.025 0"/>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(138,109,59,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- base parchment -->
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <!-- warm glow -->
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <!-- grid -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- accent pillar -->
  <rect x="1780" y="0" width="4" height="1080" fill="url(#accentGlow)"/>
  <!-- corner brand monogram (watermark) -->
  <g transform="translate(96, 960)" opacity="0.35">
    <circle cx="22" cy="22" r="22" fill="none" stroke="#8a6d3b" stroke-width="1.2"/>
    <path d="M 12 22 L 22 30 L 32 14" stroke="#8a6d3b" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="28" fill="#8a6d3b" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" letter-spacing="4">ECHO AURION</text>
  </g>
  <!-- subtle paper texture -->
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.6"/>
</svg>
