version: 2
updates:
  # Python (backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "wmorrison76"
    commit-message:
      prefix: "deps(py)"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor:
        update-types: ["minor", "patch"]

  # Node (root + client modules)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(npm)"
    labels:
      - "dependencies"
      - "node"
    groups:
      node-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(client)"
    groups:
      client-minor:
        update-types: ["minor", "patch"]

  # GitHub Actions itself
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(actions)"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker (live MixologySommelier + others)
  - package-ecosystem: "docker"
    directory: "/client/modules/MixologySommelier"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps(docker)"
