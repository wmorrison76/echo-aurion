# ─────────────────────────────────────────────────────────────────────
# Status legend
# ─────────────────────────────────────────────────────────────────────
#   queued                — ticket dispatched, work not yet begun
#   in-prep               — chef is in prep apron, foundations being laid
#   firing                — work is actively being implemented
#   at-pass               — work returned to pass for review
#   sent-back             — pass returned with notes; chef is reworking
#   fired-through         — merged to main, complete for this batch
#   NEEDS_RECONSTRUCTION  — historical work, scope not currently known
#   NEEDS_CROSS_REFERENCE — possibly already covered by current scaffolding
