# Brigade Team Registry
# The roster. Each team is a discrete unit of work with a station, a mission, a deadline, a status.
#
# This is the active operational ledger. Update it as work progresses.
# The Maestro maintains this file. Chefs de partie do not edit it directly.

brigade: EchoAurion
hat: black-with-gold-victorian-oval-and-swish
toque: classical-101-folds
standard: V&A — earned, hand-stitched, gold lettering on black

teams:

  # ─────────────────────────────────────────────────────────
  # ECHO RESONANCE PLATFORM — Phases 1-6
  # ─────────────────────────────────────────────────────────

  - id: 1
    name: Resonance MVP — Foundation
    phase: 1
    primary_station: saucier
    supporting_stations: [poissonier, the_sous]
    mission: |
      Schema, signals, types, retention. The foundation everything stands on.
    files:
      - migrations/echo_resonance/0001_resonance_readings.sql
      - migrations/echo_resonance/0002_resonance_trajectories.sql
      - migrations/echo_resonance/0003_interventions_library.sql
      - migrations/echo_resonance/0004_interventions_executed.sql
      - migrations/echo_resonance/0005_signals.sql
      - shared/types/resonance/*
      - shared/types/signals/*
      - server/services/signals/*
    status: queued
    deadline: TBD

  - id: 2
    name: Resonance MVP — Backend
    phase: 1
    primary_station: poissonier
    supporting_stations: [garde_manger]
    mission: |
      Score math, trajectory math, intervention library, forecast engine.
      Resonance engine and Echo-Fast S1 classifier.
    files:
      - server/services/echo-ai3/resonance/*
      - server/services/echo-ai3/orchestrator/*
      - server/routes/resonance.ts
      - server/routes/signals.ts
    depends_on: [1]
    status: queued
    deadline: TBD

  - id: 3
    name: Resonance MVP — Frontend
    phase: 1
    primary_station: entremetier
    supporting_stations: [demi]
    mission: |
      Whisper widget. Trajectory dashboard. Sparkline tiles. Intervention card.
      The screens GMs use during shift.
    files:
      - client/lib/resonance/*
      - client/components/resonance/*
      - client/modules/EchoResonance/*
    depends_on: [2]
    status: queued
    deadline: TBD

  - id: 4
    name: Voyage Foundations — Backend
    phase: 2
    primary_station: demi
    supporting_stations: [saucier, poissonier]
    mission: |
      Trip engine, brief engine, plan engine, gap finder, suggestion ranker,
      affinity engine, unconverted-ask tracker, map engine.
    files:
      - migrations/echo_resonance/0009_trips.sql
      - migrations/echo_resonance/0010_trip_briefs.sql
      - migrations/echo_resonance/0011_trip_blocks.sql
      - server/services/echo-ai3/voyage/*
      - server/services/echo-ai3/aurion/brief-composer.ts
      - server/routes/voyage.ts
    depends_on: [1, 2]
    status: queued
    deadline: TBD

  - id: 5
    name: Voyage Foundations — Frontend
    phase: 2
    primary_station: entremetier
    supporting_stations: [demi]
    mission: |
      Trip Brief card, Living Plan timeline, block card, suggested filler,
      map view, Add-to-Itinerary button.
    files:
      - client/lib/voyage/*
      - client/components/voyage/*
      - client/modules/EchoVoyage/*
    depends_on: [4]
    status: queued
    deadline: TBD

  - id: 6
    name: Aurion Voice — End to End
    phase: 3
    primary_station: rotisseur
    supporting_stations: [the_sous, entremetier]
    mission: |
      Speech-to-speech bridge, prosody analyzer, session manager, conversation memory,
      pre-arrival orchestrator, in-room orchestrator, the four privacy controls.
    files:
      - migrations/echo_resonance/0006_voice_sessions.sql
      - migrations/echo_resonance/0007_prosody_readings.sql
      - migrations/echo_resonance/0016_trust_scores.sql
      - server/services/echo-ai3/aurion/*
      - server/services/trust/*
      - server/routes/aurion.ts
      - server/routes/trust.ts
      - client/lib/aurion/*
      - client/components/aurion/*
      - client/components/trust/*
      - client/modules/EchoAurion/*
    depends_on: [1, 2]
    status: queued
    deadline: TBD

